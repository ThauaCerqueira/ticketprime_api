name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: build + unit tests ─────────────────────────────────────────────
  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          SA_PASSWORD: "TicketPrime@2024!"
          ACCEPT_EULA: "Y"
          MSSQL_PID: Developer
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'TicketPrime@2024!' -C -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore backend
        run: dotnet restore src/src.csproj

      - name: Build backend
        run: dotnet build src/src.csproj --no-restore --configuration Release

      - name: Restore tests
        run: dotnet restore tests/tests.csproj

      - name: Init Database
        run: |
          /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'TicketPrime@2024!' -C -i db/script.sql

      - name: Run unit tests
        run: >
          dotnet test tests/tests.csproj
          --no-restore
          --configuration Release
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults
        env:
          TEST_CONNECTION_STRING: "Server=localhost,1433;Database=TicketPrime;User Id=sa;Password=TicketPrime@2024!;TrustServerCertificate=True;"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/

  # ── Frontend: build ──────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Blazor)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore frontend
        run: dotnet restore ui/TicketPrime.Web/TicketPrime.Web.csproj

      - name: Build frontend
        run: dotnet build ui/TicketPrime.Web/TicketPrime.Web.csproj --no-restore --configuration Release

  # ── Docker: build images ─────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f src/Dockerfile -t ticketprime-api:ci .

      - name: Build Frontend image
        run: docker build -f ui/TicketPrime.Web/Dockerfile -t ticketprime-frontend:ci .

      - name: Build Nginx image
        run: docker build -f docker/nginx/Dockerfile -t ticketprime-nginx:ci .
