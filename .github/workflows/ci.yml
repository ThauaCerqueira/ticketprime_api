name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: build + unit tests ─────────────────────────────────────────────
  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore backend
        run: dotnet restore src/src.csproj

      - name: Build backend
        run: dotnet build src/src.csproj --no-restore --configuration Release

      - name: Restore tests
        run: dotnet restore tests/tests.csproj

      - name: Run unit tests
        run: >
          dotnet test tests/tests.csproj
          --no-restore
          --configuration Release
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults
        env:
          TEST_CONNECTION_STRING: "Server=.;Database=TicketPrime_CI;Trusted_Connection=true;"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/

  # ── Frontend: build ──────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Blazor)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore frontend
        run: dotnet restore ui/TicketPrime.Web/TicketPrime.Web.csproj

      - name: Build frontend
        run: dotnet build ui/TicketPrime.Web/TicketPrime.Web.csproj --no-restore --configuration Release

  # ── Docker: build images ─────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f src/Dockerfile -t ticketprime-api:ci .

      - name: Build Frontend image
        run: docker build -f ui/TicketPrime.Web/Dockerfile -t ticketprime-frontend:ci .

      - name: Build Nginx image
        run: docker build -f docker/nginx/Dockerfile -t ticketprime-nginx:ci .
