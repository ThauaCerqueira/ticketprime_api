<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5B5BD6"/>
      <stop offset="100%" stop-color="#4343B0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Ticket icon -->
  <g transform="translate(256,256)" fill="none" stroke="white" stroke-width="20" stroke-linecap="round" stroke-linejoin="round">
    <!-- Ticket body -->
    <path d="M-160,-80 L160,-80 L160,80 L-160,80 Z"/>
    <!-- Ticket notch top -->
    <path d="M-80,-80 Q-80,-40 -40,-40 Q0,-40 0,-80"/>
    <!-- Ticket notch bottom -->
    <path d="M-80,80 Q-80,40 -40,40 Q0,40 0,80"/>
    <!-- Perforation line -->
    <line x1="-160" y1="0" x2="160" y2="0" stroke-dasharray="8,12" stroke-width="3"/>
    <!-- Star decoration -->
    <circle cx="0" cy="0" r="30" fill="white" opacity="0.95"/>
    <polygon points="0,-20 6,-7 20,-7 9,3 13,18 0,10 -13,18 -9,3 -20,-7 -6,-7" fill="#5B5BD6"/>
  </g>
</svg>
