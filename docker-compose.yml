services:

  # ── Banco de dados ────────────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ticketprime_sqlserver
    environment:
      SA_PASSWORD: "${SA_PASSWORD:?SA_PASSWORD environment variable is required}"
      ACCEPT_EULA: "Y"
      # ⚠ Importante: Express NÃO suporta Full-Text Search.
      # Developer (gratuito para dev) ou Standard+ são necessários.
      # Veja: https://learn.microsoftpt-br/sql/sql-server/editions-and-components
      MSSQL_PID: "${MSSQL_PID:-Developer}"
    ports:
      - "1433:1433"
    volumes:
      - ./db/script.sql:/scripts/init.sql:ro
      - ./docker/init-db.sh:/init-db.sh:ro
      - sqlserver_data:/var/opt/mssql
    entrypoint: ["/bin/bash", "/init-db.sh"]
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd",
             "-S", "localhost", "-U", "sa", "-P", "${SA_PASSWORD:?SA_PASSWORD is required}",
             "-Q", "SELECT 1", "-C"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          memory: 1G

  # ── Redis (cache distribuído) ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ticketprime_redis
    expose:
      - "6379"
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 128M
        reservations:
          memory: 64M

  # ── API (backend) ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: src/Dockerfile
    container_name: ticketprime_api
    expose:
      - "8080"
    ports:
      - "5164:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Jwt__Key: "${JWT_KEY:?JWT_KEY environment variable is required}"
      Jwt__ExpireMinutes: "30"
      ConnectionStrings__DefaultConnection: >-
        Server=sqlserver,1433;Database=TicketPrime;
        User Id=sa;Password=${SA_PASSWORD:?SA_PASSWORD environment variable is required};TrustServerCertificate=True;
      # ── Redis (cache distribuído — requer serviço redis) ──────────────────────
      Redis__Connection: "${REDIS_CONNECTION:-redis:6379}"
      # ── Email Settings (opcional — se omitido, usa ConsoleEmailService em dev) ──
      EmailSettings__SmtpHost: "${SMTP_HOST:-}"
      EmailSettings__SmtpPort: "${SMTP_PORT:-587}"
      EmailSettings__SmtpUsername: "${SMTP_USERNAME:-}"
      EmailSettings__SmtpPassword: "${SMTP_PASSWORD:-}"
      EmailSettings__FromEmail: "${SMTP_FROM_EMAIL:-}"
      EmailSettings__FromName: "${SMTP_FROM_NAME:-Ticket Prime}"
      EmailSettings__UseSsl: "${SMTP_USE_SSL:-true}"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M

  # ── UI (Blazor WebAssembly — agora servida estaticamente) ─────────────────────
  frontend:
    build:
      context: .
      dockerfile: ui/TicketPrime.Web/Dockerfile
    container_name: ticketprime_frontend
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ApiSettings__BaseUrl: http://api:8080
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M

  # ── Reverse Proxy (nginx com TLS termination) ─────────────────────────────────
  proxy:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: ticketprime_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/certs:/etc/nginx/certs:ro
      # Let's Encrypt certificates (production) override the self-signed certs above.
      # Run `scripts/certbot-init.sh` once to obtain the first certificate.
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - api
      - frontend

  # ── Let's Encrypt certificate renewal ────────────────────────────────────────
  # First-run: docker compose run --rm certbot certonly --webroot \
  #   --webroot-path /var/www/certbot -d yourdomain.com --email you@email.com --agree-tos
  # Renewal runs automatically every 12 h; nginx reloads on success.
  certbot:
    image: certbot/certbot:latest
    container_name: ticketprime_certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
                  while :; do
                    certbot renew --quiet --webroot --webroot-path /var/www/certbot
                    sleep 43200;
                  done"
    profiles: ["production"]

  # ── MinIO (S3-compatible storage para backups) ────────────────────────────────
  # Console: http://localhost:9001 (login: admin / MINIO_ROOT_PASSWORD)
  # Free, open-source, S3-compatible.
  minio:
    image: quay.io/minio/minio:latest
    container_name: ticketprime_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-admin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}"
      MINIO_DOMAIN: minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console web
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M

  # ── MinIO Init (one-shot: bucket, lifecycle, usuario backup) ─────────────────
  # Executa UMA vez para configurar o MinIO.
  minio-init:
    image: minio/mc:latest
    container_name: ticketprime_minio_init
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-admin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}"
      MINIO_BACKUP_SECRET: "${MINIO_BACKUP_SECRET:?MINIO_BACKUP_SECRET is required}"
      BUCKET_NAME: ticketprime
      MINIO_ENDPOINT: minio:9000
    volumes:
      - ./docker/minio-init.sh:/minio-init.sh:ro
    entrypoint: ["/bin/bash", "/minio-init.sh"]
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    profiles: ["setup"]

  # ── Backup automático com MinIO S3 ───────────────────────────────────────────
  # Cria backups FULL (semanal/mensal) ou DAILY compactados e envia ao MinIO.
  # O .bak fica APENAS em /tmp/ dentro do container (não ocupa volume persistente).
  # Retenção gerenciada por lifecycle policy do MinIO.
  # Iniciar: docker compose --profile backup up -d backup
  backup:
    image: mcr.microsoft.com/mssql-tools:latest
    container_name: ticketprime_backup
    environment:
      SA_PASSWORD: "${SA_PASSWORD:?SA_PASSWORD is required}"
      DB_HOST: sqlserver
      DB_NAME: TicketPrime
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ticketprime-backup
      S3_SECRET_KEY: "${MINIO_BACKUP_SECRET:?MINIO_BACKUP_SECRET is required}"
      S3_BUCKET: ticketprime
    volumes:
      - ./docker/backup.sh:/backup.sh:ro
      - ./docker/backup-restore.sh:/backup-restore.sh:ro
    entrypoint: >
      /bin/bash -c "
        set -e;
        # Instala o MinIO Client (mc) para upload S3
        echo '[backup] 📦 Instalando MinIO Client...';
        apt-get update -qq && apt-get install -y -qq curl > /dev/null 2>&1;
        curl -sL https://dl.min.io/client/mc/release/linux-amd64/mc \
          -o /usr/local/bin/mc;
        chmod +x /usr/local/bin/mc;
        echo '[backup] ✅ MinIO Client instalado: mc $(mc --version 2>&1)';
        chmod +x /backup.sh /backup-restore.sh;
        echo '[backup] 🚀 Serviço de backup iniciado';
        trap exit TERM;
        while :; do
          /backup.sh;
          sleep 43200;  # A cada 12 horas
        done"
    depends_on:
      sqlserver:
        condition: service_healthy
      minio:
        condition: service_healthy
    profiles: ["backup"]

volumes:
  sqlserver_data:
    name: ticketprime_sqlserver_data
  minio_data:
    name: ticketprime_minio_data
  certbot_certs:
  certbot_webroot:
