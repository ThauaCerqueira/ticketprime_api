# Nginx reverse proxy configuration for TicketPrime
# Provides TLS termination, static file caching, and unified routing
# for both the API (backend) and Blazor frontend.

events {
    worker_connections 1024;
}

http {
    # ── Security headers ──────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Rate limiting (global) ────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=global:10m rate=200r/s;

    # ── SSL configuration ─────────────────────────────────────────────
    # For production: use Let's Encrypt (certbot) or a trusted CA.
    # For development: use the self-signed certificate generated below.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    upstream api_upstream {
        server api:8080;
    }

    upstream frontend_upstream {
        server frontend:8080;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────
    server {
        listen 80;
        server_name ticketprime.local;

        # Let's Encrypt ACME challenge (served from certbot webroot volume).
        # All other traffic is redirected to HTTPS.
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ──────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name ticketprime.local;

        # Development: self-signed certificate (docker/nginx/certs/).
        # Production: Let's Encrypt certificate obtained via certbot service.
        #   Replace paths below with:
        #     /etc/letsencrypt/live/yourdomain.com/fullchain.pem
        #     /etc/letsencrypt/live/yourdomain.com/privkey.pem
        ssl_certificate     /etc/nginx/certs/ticketprime.crt;
        ssl_certificate_key /etc/nginx/certs/ticketprime.key;

        # ── API routes ────────────────────────────────────────────────
        location /api/ {
            limit_req zone=global burst=100 nodelay;

            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Increase timeout for large uploads (event photos)
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
            client_max_body_size 50M;
        }

        # ── WebSocket (Blazor SignalR) ────────────────────────────────
        location /_blazor {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400; # 24h for long-lived SignalR connections
        }

        # ── Frontend (Blazor) ─────────────────────────────────────────
        location / {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Health check ──────────────────────────────────────────────
        location /health {
            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
